const b2u = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function unlock(pw) {
  const salt = b2u(DATA.salt), iv = b2u(DATA.iv), ct = b2u(DATA.ct);
  const base = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw),
      "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
      {name:"PBKDF2", salt, iterations:DATA.iter, hash:"SHA-256"},
      base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const buf = await crypto.subtle.decrypt({name:"AES-GCM", iv}, key, ct);
  return new TextDecoder().decode(buf);
}
async function tryOpen(pw, remember) {
  try {
    const html = await unlock(pw);
    if (remember) sessionStorage.setItem("site_pw", pw);
    document.open(); document.write(html); document.close();
  } catch (e) {
    sessionStorage.removeItem("site_pw");
    document.getElementById("err").textContent = "비밀번호가 올바르지 않습니다.";
    document.getElementById("pw").value = "";
  }
}
document.getElementById("go").onclick = () => tryOpen(document.getElementById("pw").value, true);
document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("go").click(); });
// 같은 세션에서 이미 입력했으면(포털에서 등) 자동 잠금해제
const saved = sessionStorage.getItem("site_pw");
if (saved) tryOpen(saved, false);
